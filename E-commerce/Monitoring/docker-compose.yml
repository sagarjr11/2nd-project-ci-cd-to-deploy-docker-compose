version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=Sagarjr11@ 
      - GF_SECURITY_ADMIN_USER=sagaromane    
  node_exporter: 
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"
    #volumes:
     ### /:/rootfs:ro
    ###- '--path.sysfs=/host/sys'      
