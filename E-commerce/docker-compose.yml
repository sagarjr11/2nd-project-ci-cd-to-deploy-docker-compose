services:
   frontend:
     build: ./frontend
     container_name: frontend
     ports:
      - "3000:8080"
      - "3001:3001"
     depends_on:
      - backend
     network_mode: host
       #- ecommerce-network # use this for Ec2 instances or the actual setup not codespaces setup
       #- host         # use this for local development
     restart: unless-stopped
   
   backend:  
     build: ./backend
     container_name: backend
     ports:
      - "5000:5000"
     network_mode: host
       #- ecommerce-network # use this for Ec2 instances or the actual setup not codespaces setup
       #- host         # use this for local development
     restart: unless-stopped
     environment:
      - MONGO_URI=mongodb://localhost:27017/ecommerce
     depends_on:
      - mongo
   mongo:
     image: mongo:6
     container_name: mongo
     ports:
      - "27017:27017"
     network_mode: host
       #- ecommerce-network # use this for Ec2 instances or the actual setup not codespaces setup
       #- host         # use this for local development
     restart: unless-stopped
     volumes:
      - mongo-data:/data/db
 #networks:  # un comment this section and the network references in the services for Ec2 instances or the actual setup not codespaces setup
   ##   driver: bridge
volumes:
       mongo-data:           
      